spring:
  application:
    name: prac

  datasource:
    url: jdbc:mysql://localhost:3306/delivery?serverTimezone=Asia/Seoul&useSSL=false
    username: root
    password: mysql1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Liquibase 사용 시 update 대신 validate 추천
    properties:
      hibernate:
        show_sql: true
        highlight_sql: true
        format_sql: true
      database-platform: org.hibernate.dialect.MySQLDialect

  liquibase:
    enabled: true
    change-log: classpath:/db/db.changelog-master.yaml